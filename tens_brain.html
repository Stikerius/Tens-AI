<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENS – Neural Brain</title>
<script src="d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080810;
  color: #e0e8ff;
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
}

/* Faint anatomical brain background outline */
#brain-bg-svg {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  opacity: 0.04;
}

#graph-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; padding: 20px 28px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 100;
  pointer-events: none;
}
#title-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 4px; color: rgba(224,232,255,0.3); margin-bottom: 5px;
}
#title-name {
  font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 500;
  letter-spacing: 8px; color: rgba(224,232,255,0.85);
}

/* ── Stats panel ── */
#stats-panel {
  text-align: right; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: rgba(224,232,255,0.3); letter-spacing: 1.5px;
  line-height: 1.4;
}
.stat-row { margin-bottom: 8px; }
.stat-label { display: block; font-size: 8px; margin-bottom: 1px; opacity: 0.6; }
.stat-val {
  font-size: 22px; font-weight: 500; display: block;
  color: rgba(224,232,255,0.7); letter-spacing: 2px;
}

/* ── Tooltip ── */
#tooltip {
  position: fixed; background: rgba(8,8,16,0.96);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 2px solid rgba(74,158,255,0.6);
  padding: 12px 16px; pointer-events: none;
  opacity: 0; transition: opacity 0.12s;
  z-index: 500; max-width: 260px;
  backdrop-filter: blur(12px);
}
.tt-title {
  font-size: 14px; font-weight: 500; margin-bottom: 7px;
  color: rgba(224,232,255,0.9); letter-spacing: 1px;
}
.tt-entries { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
.tt-fact { font-size: 11px; color: rgba(255,255,255,0.45); display: block; margin-bottom: 3px; line-height: 1.4; }

/* ── Delete bar ── */
#delete-bar {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 101; display: none; align-items: center; gap: 12px;
  background: rgba(8,8,16,0.96); border: 1px solid rgba(224,85,85,0.3);
  padding: 8px 18px; font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1.5px; backdrop-filter: blur(10px);
}
#delete-bar.visible { display: flex; }
#delete-node-label { color: rgba(255,180,180,0.85); text-transform: uppercase; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
#delete-action-btn {
  background: transparent; border: 1px solid rgba(224,85,85,0.4); color: rgba(224,85,85,0.8);
  font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.5px;
  padding: 4px 12px; cursor: pointer; transition: all 0.15s;
}
#delete-action-btn:hover { background: rgba(224,85,85,0.15); color: #fff; }
#delete-confirm-row { display: none; align-items: center; gap: 8px; }
#delete-confirm-row.visible { display: flex; }
.del-btn { background: transparent; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.5px; padding: 4px 12px; cursor: pointer; transition: all 0.15s; border: 1px solid; }
.del-btn-ja { border-color: rgba(224,85,85,0.4); color: rgba(224,85,85,0.9); }
.del-btn-ja:hover { background: rgba(224,85,85,0.2); color: #fff; }
.del-btn-nein { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.3); }
.del-btn-nein:hover { background: rgba(255,255,255,0.07); color: #fff; }
#delete-close { background: transparent; border: none; color: rgba(255,255,255,0.2); font-size: 14px; cursor: pointer; }
#delete-close:hover { color: rgba(255,255,255,0.6); }

/* ── Legend ── */
#legend {
  position: fixed; bottom: 20px; right: 22px; z-index: 100;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: rgba(255,255,255,0.25); letter-spacing: 1px; line-height: 2.2;
}
.leg-item { display: flex; align-items: center; gap: 8px; }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Controls ── */
#controls {
  position: fixed; bottom: 20px; left: 22px; z-index: 100;
  font-family: 'JetBrains Mono', monospace; font-size: 8px;
  color: rgba(255,255,255,0.14); letter-spacing: 1.5px; line-height: 2.2;
  pointer-events: none;
}

/* ── Add / Chat buttons ── */
#action-btns {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; gap: 10px; pointer-events: all;
}
.action-btn {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; padding: 7px 16px; cursor: pointer;
  transition: all 0.2s; text-decoration: none; display: flex; align-items: center;
}
.action-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; background: #080810;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 18px; z-index: 1000;
  font-family: 'JetBrains Mono', monospace; color: rgba(224,232,255,0.4);
  letter-spacing: 3px; font-size: 10px; transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loader-bar { width: 160px; height: 1px; background: rgba(224,232,255,0.08); position: relative; overflow: hidden; }
.loader-bar::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(74,158,255,0.7), transparent);
  animation: sweep 1.6s ease-in-out infinite;
}
@keyframes sweep { from { left: -100%; } to { left: 100%; } }

/* ── Input overlay ── */
#input-overlay {
  display: none; position: fixed; inset: 0; background: rgba(8,8,16,0.94);
  z-index: 800; align-items: center; justify-content: center; flex-direction: column;
  gap: 20px; backdrop-filter: blur(10px);
}
#input-overlay.active { display: flex; }
#input-label {
  font-size: 14px; font-weight: 500; letter-spacing: 4px;
  color: rgba(224,232,255,0.7); text-transform: uppercase;
}
#input-overlay input {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15);
  color: #e0e8ff; font-family: 'Inter', sans-serif; font-size: 14px;
  padding: 12px 18px; width: 320px; outline: none; border-radius: 4px;
  transition: border-color 0.2s;
}
#input-overlay input:focus { border-color: rgba(74,158,255,0.5); }
.overlay-btns { display: flex; gap: 12px; }
.overlay-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5);
  font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px;
  padding: 9px 20px; cursor: pointer; transition: all 0.2s; border-radius: 4px;
}
.overlay-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
</style>
</head>

<script>
const API_URL    = 'http://localhost:8000/brain';
const REFRESH_MS = 30000;

// Color palette: scientific, not neon
const CAT = {
  kern:         { color: '#e0e8ff', rgb: [224,232,255], glow: 12 },
  technologie:  { color: '#4a9eff', rgb: [74, 158,255], glow: 10 },
  wissenschaft: { color: '#4aff9e', rgb: [74, 255,158], glow: 10 },
  persoenlich:  { color: '#ffb347', rgb: [255,179, 71], glow: 10 },
  gesundheit:   { color: '#ff6b9e', rgb: [255,107,158], glow: 10 },
  gesellschaft: { color: '#c09bff', rgb: [192,155,255], glow: 10 },
  kultur:       { color: '#ffe47a', rgb: [255,228,122], glow: 10 },
  security:     { color: '#ff8a65', rgb: [255,138,101], glow: 10 },
  aktuell:      { color: '#ffe47a', rgb: [255,228,122], glow: 10 },
};

const CLUSTER_POS = {
  kern:         { x: 0.50, y: 0.50 },
  technologie:  { x: 0.70, y: 0.25 },
  wissenschaft: { x: 0.70, y: 0.75 },
  persoenlich:  { x: 0.28, y: 0.72 },
  gesundheit:   { x: 0.22, y: 0.45 },
  gesellschaft: { x: 0.30, y: 0.25 },
  kultur:       { x: 0.80, y: 0.52 },
  security:     { x: 0.50, y: 0.18 },
  aktuell:      { x: 0.50, y: 0.82 },
};

const FALLBACK = {
  nodes: [
    { id:'core', label:'TENS', cat:'kern', entries:10, facts:['KI-Assistent','Dolphin-Mistral'], _type:'core' },
    { id:'n1', label:'Python', cat:'technologie', entries:8, facts:['OOP','Funktionen'], _type:'collection', _collection:'wissen_python' },
    { id:'n2', label:'KI/ML', cat:'wissenschaft', entries:7, facts:['Neural Networks'], _type:'collection', _collection:'wissen_ki' },
  ],
  links: [{source:'core',target:'n1'},{source:'core',target:'n2'}],
  meta: { total_entries:0, updated: new Date().toISOString() },
};

let nodes = [], links = [];
let simulation, svg, g, zoomBehavior;
let nodeEl, linkBaseEl, linkFlowEl;
let currentTransform = d3.zoomIdentity;
let hoveredId = null, selectedNode = null;
let dashOffset = 0;
let activePulses = [];
let totalEntries = 0;
let driftT = 0;

// ── Node sizing ────────────────────────────────────────────────────────────────
function somaR(d) {
  if (d.id?.startsWith('fact-')) return 7;
  if (d.id?.startsWith('sub-'))  return Math.max(10, Math.min(22, 9 + (d.entries||1)*1.2));
  return Math.max(18, Math.min(48, 14 + (d.entries||1)*2.2));
}

function depthOpacity(d) {
  return Math.max(0.35, Math.min(0.95, 0.60 + (d._z||0)*0.0015));
}

// Organic dendrites
function getDendrites(d) {
  if (d._dendrites) return d._dendrites;
  const r     = somaR(d);
  const count = d.id?.startsWith('sub-') ? 4 : Math.min(8, 4 + Math.floor((d.entries||1)/4));
  d._dendrites = Array.from({length: count}, (_, i) => {
    const base = (i / count) * Math.PI * 2 + (Math.random()-0.5)*0.6;
    const len  = r * (0.6 + Math.random()*0.8);
    // Slightly curved dendrite path
    const mid  = r + len*0.5;
    const ang2 = base + (Math.random()-0.5)*0.3;
    return {
      angle: base, len, w: 0.2 + Math.random()*0.35,
      cpAngle: ang2, cpDist: mid,
    };
  });
  return d._dendrites;
}

// Bezier synapse path
function synapseD(d) {
  const s = typeof d.source === 'object' ? d.source : {x:0,y:0};
  const t = typeof d.target === 'object' ? d.target : {x:0,y:0};
  if (s.x==null||t.x==null) return 'M0,0';
  const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
  const dx = t.x-s.x, dy = t.y-s.y;
  const len = Math.sqrt(dx*dx+dy*dy)||1;
  const curve = len*(d._curve ?? 0.1);
  const cpx = mx-(dy/len)*curve, cpy = my+(dx/len)*curve;
  return `M${s.x},${s.y} Q${cpx},${cpy} ${t.x},${t.y}`;
}

// ── SVG setup ─────────────────────────────────────────────────────────────────
function setupSVG() {
  svg = d3.select('#graph-svg').attr('width',innerWidth).attr('height',innerHeight);
  svg.on('click', () => { if (selectedNode) cancelDelete(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') { cancelDelete(); hideInput(); } });

  const defs = svg.append('defs');

  // Radial gradient soma fills (off-center for 3D sphere feel)
  Object.entries(CAT).forEach(([key, val]) => {
    const [r,g,b] = val.rgb;
    const gr = defs.append('radialGradient')
      .attr('id', `soma-${key}`).attr('cx','33%').attr('cy','30%').attr('r','65%');
    gr.append('stop').attr('offset','0%')  .attr('stop-color',`rgba(${r},${g},${b},0.65)`);
    gr.append('stop').attr('offset','50%') .attr('stop-color',`rgba(${r},${g},${b},0.22)`);
    gr.append('stop').attr('offset','100%').attr('stop-color',`rgba(${r},${g},${b},0.05)`);

    // Soft glow filter
    const f = defs.append('filter').attr('id',`glow-${key}`)
      .attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
    f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','5').attr('result','b');
    f.append('feColorMatrix').attr('in','b').attr('type','matrix')
      .attr('values',`0 0 0 0 ${r/255} 0 0 0 0 ${g/255} 0 0 0 0 ${b/255} 0 0 0 0.8 0`).attr('result','c');
    const m = f.append('feMerge');
    m.append('feMergeNode').attr('in','c');
    m.append('feMergeNode').attr('in','SourceGraphic');
  });

  zoomBehavior = d3.zoom().scaleExtent([0.1, 8])
    .on('zoom', e => { currentTransform = e.transform; g.attr('transform', e.transform); });
  svg.call(zoomBehavior);
  g = svg.append('g').attr('class','root-g');
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  g.selectAll('*').remove();
  links.forEach(l => { if (l._curve==null) l._curve = (Math.random()-0.5)*0.22; });
  nodes.forEach(n => { if (n._z==null) n._z = (Math.random()-0.5)*140; });

  // Synapse base (very faint)
  linkBaseEl = g.selectAll('.lb').data(links).enter().append('path').attr('class','lb')
    .attr('fill','none').attr('stroke','rgba(255,255,255,0.025)').attr('stroke-width',0.8);

  // Synapse flow (animated dashes)
  linkFlowEl = g.selectAll('.lf').data(links).enter().append('path').attr('class','lf')
    .attr('fill','none')
    .attr('stroke', d => {
      const s = typeof d.source==='object' ? d.source : nodes.find(n=>n.id===d.source);
      return (CAT[s?.cat]||CAT.kern).color;
    })
    .attr('stroke-width', d => {
      const t = typeof d.target==='object' ? d.target : nodes.find(n=>n.id===d.target);
      return t?.id?.startsWith('fact-') ? 0.4 : 0.7;
    })
    .attr('stroke-dasharray','4 18').attr('stroke-dashoffset',0).attr('opacity',0.18);

  // Neuron groups
  nodeEl = g.selectAll('.neuron').data(nodes).enter().append('g').attr('class','neuron')
    .attr('opacity', depthOpacity)
    .style('cursor','pointer')
    .on('mouseover', onHover).on('mousemove', onMove).on('mouseout', onOut)
    .on('click', onClick)
    .call(d3.drag().on('start',dragStart).on('drag',dragged).on('end',dragEnd));

  // Organic dendrites (not for fact nodes)
  nodeEl.each(function(d) {
    if (d.id?.startsWith('fact-')) return;
    const cat = CAT[d.cat]||CAT.kern;
    getDendrites(d).forEach(dend => {
      const ex = Math.cos(dend.angle) * (somaR(d) + dend.len);
      const ey = Math.sin(dend.angle) * (somaR(d) + dend.len);
      const cpx = Math.cos(dend.cpAngle) * (somaR(d) + dend.cpDist * 0.5);
      const cpy = Math.sin(dend.cpAngle) * (somaR(d) + dend.cpDist * 0.5);
      d3.select(this).append('path')
        .attr('class','dendrite')
        .attr('d', `M0,0 Q${cpx},${cpy} ${ex},${ey}`)
        .attr('fill','none')
        .attr('stroke', cat.color).attr('stroke-width', dend.w)
        .attr('opacity', 0.22).attr('stroke-linecap','round');
    });
  });

  // Shadow/depth ring (3D feel)
  nodeEl.append('circle')
    .attr('r', d => somaR(d) + 4)
    .attr('fill', 'none')
    .attr('stroke', d => {
      const c = CAT[d.cat]||CAT.kern;
      const [r,g,b] = c.rgb;
      return `rgba(${r},${g},${b},0.06)`;
    })
    .attr('stroke-width', d => somaR(d) * 0.3)
    .attr('filter', d => `url(#glow-${d.cat})`);

  // Soma sphere with gradient
  nodeEl.append('circle').attr('class','soma')
    .attr('r', somaR)
    .attr('fill', d => `url(#soma-${d.cat})`)
    .attr('stroke', d => (CAT[d.cat]||CAT.kern).color)
    .attr('stroke-width', d => d.id?.startsWith('fact-') ? 0.5 : d.id?.startsWith('sub-') ? 0.8 : 1.2)
    .attr('stroke-opacity', d => d.id?.startsWith('fact-') ? 0.4 : 0.75);

  // Slow breathing pulse for main nodes
  nodeEl.each(function(d) {
    if (d.id?.startsWith('fact-')) return;
    const base = somaR(d);
    const peak = base * (d.id?.startsWith('sub-') ? 1.04 : 1.07);
    const el   = d3.select(this).select('.soma');
    (function breathe() {
      el.transition().delay(Math.random()*800)
        .duration(3000 + Math.random()*1500).ease(d3.easeSinInOut)
        .attr('r', peak)
        .transition().duration(2800 + Math.random()*1500).ease(d3.easeSinInOut)
        .attr('r', base).on('end', breathe);
    })();
  });

  // Labels
  nodeEl.append('text').attr('class','label')
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('fill', d => (CAT[d.cat]||CAT.kern).color)
    .attr('font-family','JetBrains Mono, monospace')
    .attr('font-size', d => {
      if (d.id?.startsWith('fact-')) return 6;
      if (d.id?.startsWith('sub-'))  return 7;
      return Math.max(7, Math.min(11, somaR(d)*0.34));
    })
    .attr('letter-spacing','0.5').attr('pointer-events','none')
    .attr('opacity', d => d.id?.startsWith('fact-') ? 0.45 : d.id?.startsWith('sub-') ? 0.65 : 0.85)
    .text(d => d.label.slice(0,16));

  simulation.on('tick', tick);
  updateStats();
}

function tick() {
  if (linkBaseEl) linkBaseEl.attr('d', synapseD);
  if (linkFlowEl) linkFlowEl.attr('d', synapseD);
  if (nodeEl)     nodeEl.attr('transform', d => `translate(${d.x??0},${d.y??0})`);
}

// ── Pulse animation (traveling dot along connection) ──────────────────────────
function spawnPulse() {
  if (!links.length) return;
  const l = links[Math.floor(Math.random()*links.length)];
  const s = typeof l.source==='object' ? l.source : nodes.find(n=>n.id===l.source);
  const t = typeof l.target==='object' ? l.target : nodes.find(n=>n.id===l.target);
  if (!s?.x||!t?.x) return;
  activePulses.push({ s, t, curve: l._curve??0.1, progress:0, speed:0.004+Math.random()*0.006, rgb:(CAT[s.cat]||CAT.kern).rgb });
}

function bezierPt(sx,sy,cpx,cpy,tx,ty,t) {
  const m = 1-t;
  return { x: m*m*sx+2*m*t*cpx+t*t*tx, y: m*m*sy+2*m*t*cpy+t*t*ty };
}

// SVG pulse layer (rendered above connections)
let pulseSvgGroup;
function initPulseLayer() {
  // Pulses are drawn in SVG for proper zoom transform
}

// Use requestAnimationFrame for pulse animation
let _pFrame;
function animatePulses() {
  _pFrame = requestAnimationFrame(animatePulses);

  dashOffset = (dashOffset + 0.5) % 100;
  if (linkFlowEl) linkFlowEl.attr('stroke-dashoffset', d => {
    const sid = typeof d.source==='object' ? d.source.id : d.source;
    const tid = typeof d.target==='object' ? d.target.id : d.target;
    const active = hoveredId && (sid===hoveredId||tid===hoveredId);
    return active ? -(dashOffset*2.5)%100 : -dashOffset;
  });

  if (Math.random()<0.035) spawnPulse();

  // Draw pulses on a canvas overlay synced to SVG transform
  const canvas = document.getElementById('pulse-canvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    activePulses = activePulses.filter(p => {
      p.progress += p.speed;
      if (p.progress >= 1) return false;
      const sx=p.s.x, sy=p.s.y, tx=p.t.x, ty=p.t.y;
      const mx=(sx+tx)/2, my=(sy+ty)/2;
      const dx=tx-sx, dy=ty-sy, len=Math.sqrt(dx*dx+dy*dy)||1;
      const curve=len*p.curve;
      const cpx=mx-(dy/len)*curve, cpy=my+(dx/len)*curve;
      const pt=bezierPt(sx,sy,cpx,cpy,tx,ty,p.progress);
      const px=currentTransform.applyX(pt.x), py=currentTransform.applyY(pt.y);
      const a=1-p.progress*0.5;
      const [r,g,b]=p.rgb;
      ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a*0.9})`;
      ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a*0.15})`;
      ctx.fill();
      return true;
    });
  }
}

// ── Interactions ──────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttBody  = document.getElementById('tt-body');

function connectedSet(id) {
  const s = new Set([id]);
  links.forEach(l => {
    const sid = typeof l.source==='object' ? l.source.id : l.source;
    const tid = typeof l.target==='object' ? l.target.id : l.target;
    if (sid===id) s.add(tid);
    if (tid===id) s.add(sid);
  });
  return s;
}

function onHover(event, d) {
  hoveredId = d.id;
  const cat = CAT[d.cat]||CAT.kern;
  tooltip.style.opacity = '1';
  tooltip.style.borderLeftColor = cat.color;
  ttTitle.style.color = cat.color;
  ttTitle.textContent = d.label;
  document.getElementById('tt-entries').textContent = `${d.entries} Einträge`;
  ttBody.innerHTML = (d.facts||[]).map(f=>`<span class="tt-fact">› ${f}</span>`).join('');

  const conn = connectedSet(d.id);
  nodeEl.attr('opacity', n => conn.has(n.id) ? depthOpacity(n) : 0.05);
  linkFlowEl
    .attr('opacity', l => {
      const sid = typeof l.source==='object' ? l.source.id : l.source;
      const tid = typeof l.target==='object' ? l.target.id : l.target;
      return (sid===d.id||tid===d.id) ? 0.85 : 0.02;
    })
    .attr('stroke-width', l => {
      const sid = typeof l.source==='object' ? l.source.id : l.source;
      const tid = typeof l.target==='object' ? l.target.id : l.target;
      return (sid===d.id||tid===d.id) ? 2.5 : 0.4;
    });
}

function onMove(event) {
  const tipW = 270;
  tooltip.style.left = (event.pageX+22+tipW>innerWidth ? event.pageX-tipW-12 : event.pageX+22)+'px';
  tooltip.style.top  = (event.pageY-12)+'px';
}

function onOut() {
  hoveredId = null;
  tooltip.style.opacity = '0';
  if (nodeEl) nodeEl.attr('opacity', depthOpacity);
  if (linkFlowEl) linkFlowEl.attr('opacity',0.18).attr('stroke-width', d => {
    const t = typeof d.target==='object' ? d.target : nodes.find(n=>n.id===d.target);
    return t?.id?.startsWith('fact-') ? 0.4 : 0.7;
  });
}

function onClick(event, d) {
  event.stopPropagation();
  svg.transition().duration(650).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(innerWidth/2,innerHeight/2).scale(2.0).translate(-(d.x||0),-(d.y||0))
  );
  if (d._type !== 'core') {
    selectedNode = d;
    document.getElementById('delete-node-label').textContent = d.label;
    document.getElementById('delete-confirm-row').classList.remove('visible');
    document.getElementById('delete-action-btn').style.display = '';
    document.getElementById('delete-bar').classList.add('visible');
  }
}

function dragStart(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragged(event, d)   { d.fx=event.x; d.fy=event.y; }
function dragEnd(event, d)   { if (!event.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

// ── Delete ────────────────────────────────────────────────────────────────────
function showDeleteConfirm() {
  document.getElementById('delete-confirm-row').classList.add('visible');
  document.getElementById('delete-action-btn').style.display = 'none';
}
function cancelDelete() {
  selectedNode = null;
  document.getElementById('delete-bar').classList.remove('visible');
  document.getElementById('delete-confirm-row').classList.remove('visible');
  document.getElementById('delete-action-btn').style.display = '';
}
async function performDelete() {
  const d = selectedNode;
  if (!d||d._type==='core') return;
  const params = new URLSearchParams({type:d._type});
  if (d._collection) params.append('collection',d._collection);
  if (d._doc_id)     params.append('doc_id',d._doc_id);
  if (d._key)        params.append('key',d._key);
  try {
    const res  = await fetch(`${API_URL.replace('/brain','/brain/node')}?${params}`,{method:'DELETE'});
    const data = await res.json();
    if (!data.ok) return;
  } catch { return; }
  const delId = d.id;
  const parentCount = {};
  links.forEach(l => { const tid=typeof l.target==='object'?l.target.id:l.target; parentCount[tid]=(parentCount[tid]||0)+1; });
  const orphans = links
    .filter(l=>(typeof l.source==='object'?l.source.id:l.source)===delId)
    .map(l=>typeof l.target==='object'?l.target.id:l.target)
    .filter(id=>parentCount[id]<=1);
  const removeIds = new Set([delId,...orphans]);
  nodes = nodes.filter(n=>!removeIds.has(n.id));
  links = links.filter(l=>{
    const sid=typeof l.source==='object'?l.source.id:l.source;
    const tid=typeof l.target==='object'?l.target.id:l.target;
    return !removeIds.has(sid)&&!removeIds.has(tid);
  });
  cancelDelete();
  tooltip.style.opacity='0'; hoveredId=null;
  simulation.nodes(nodes); simulation.force('link').links(links);
  simulation.alpha(0.3).restart(); draw(); updateStats();
}

// ── Stats & data ──────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('node-count').textContent = nodes.length;
  document.getElementById('link-count').textContent = links.length;
  document.getElementById('entries-count').textContent = totalEntries || '–';
}

function updateTimestamp(iso) {
  if (!iso) return;
  const d=new Date(iso), p=n=>String(n).padStart(2,'0');
  document.getElementById('last-updated').textContent = `${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function loadData() {
  try {
    const res = await fetch(API_URL, {signal:AbortSignal.timeout(5000)});
    if (!res.ok) throw new Error();
    const data = await res.json();
    totalEntries = data.meta?.total_entries || 0;
    return data;
  } catch {
    return FALLBACK;
  }
}

function buildSimulation() {
  const cx=innerWidth/2, cy=innerHeight/2;
  nodes.forEach(n => { if (n.x==null){n.x=cx+(Math.random()-0.5)*180; n.y=cy+(Math.random()-0.5)*180;} });
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>{
      const t=typeof d.target==='object'?d.target:nodes.find(n=>n.id===d.target);
      return t?.id?.startsWith('fact-')||t?.id?.startsWith('sub-') ? 70 : 140+Math.random()*30;
    }))
    .force('charge', d3.forceManyBody().strength(d=>d.id?.startsWith('fact-')?-70:d.id?.startsWith('sub-')?-180:-480))
    .force('center', d3.forceCenter(cx,cy))
    .force('collision', d3.forceCollide().radius(d=>somaR(d)+12))
    .force('clusterX', d3.forceX(d=>(CLUSTER_POS[d.cat]||CLUSTER_POS.kern).x*innerWidth).strength(d=>d.id==='tens-core'?0.22:0.05))
    .force('clusterY', d3.forceY(d=>(CLUSTER_POS[d.cat]||CLUSTER_POS.kern).y*innerHeight).strength(d=>d.id==='tens-core'?0.22:0.05));
}

async function initGraph(data) {
  nodes = data.nodes||[];
  links = (data.links||[]).map(l=>({...l}));
  buildSimulation(); draw(); updateTimestamp(data.meta?.updated);
}

async function refreshData() {
  const data = await loadData();
  const posMap={};
  nodes.forEach(n=>{posMap[n.id]={x:n.x,y:n.y};});
  nodes = (data.nodes||[]).map(n=>({...n,x:posMap[n.id]?.x,y:posMap[n.id]?.y}));
  links = (data.links||[]).map(l=>({...l}));
  buildSimulation(); draw(); updateTimestamp(data.meta?.updated);
}

// ── Add topic ─────────────────────────────────────────────────────────────────
function showInput() { document.getElementById('input-overlay').classList.add('active'); document.getElementById('topic-input').focus(); }
function hideInput() { document.getElementById('input-overlay').classList.remove('active'); document.getElementById('topic-input').value=''; }
function catFromLabel(l) {
  const s=l.toLowerCase();
  if (['python','javascript','react','docker','git','linux','sql','typescript','html','css'].some(k=>s.includes(k))) return 'technologie';
  if (['physik','chemie','biologie','mathematik','quantum','ki','neural'].some(k=>s.includes(k))) return 'wissenschaft';
  if (['sport','fitness','ernährung','gesundheit'].some(k=>s.includes(k))) return 'gesundheit';
  if (['philosophie','psychologie','finanzen','recht','geschichte'].some(k=>s.includes(k))) return 'gesellschaft';
  if (['musik','reisen','kultur'].some(k=>s.includes(k))) return 'kultur';
  if (['hack','security','pentest','ctf'].some(k=>s.includes(k))) return 'security';
  return 'kern';
}
function addTopic() {
  const val=document.getElementById('topic-input').value.trim();
  if (!val) return;
  const nid='manual-'+Date.now(), cat=catFromLabel(val);
  const cx=innerWidth/2, cy=innerHeight/2;
  const nn={id:nid,label:val,cat,entries:1,facts:['Manuell hinzugefügt'],_type:'core',
    x:cx+(Math.random()-0.5)*120,y:cy+(Math.random()-0.5)*120};
  nodes.push(nn);
  const anchor=nodes[Math.floor(Math.random()*Math.min(nodes.length-1,5))];
  links.push({source:nid,target:anchor.id});
  simulation.nodes(nodes); simulation.force('link').links(links);
  simulation.alpha(0.5).restart(); draw(); hideInput();
}
document.getElementById('topic-input').addEventListener('keydown',e=>{
  if (e.key==='Enter') addTopic();
  if (e.key==='Escape') hideInput();
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  svg.attr('width',innerWidth).attr('height',innerHeight);
  const c=document.getElementById('pulse-canvas');
  if (c) { c.width=innerWidth; c.height=innerHeight; }
  if (simulation) { simulation.force('center',d3.forceCenter(innerWidth/2,innerHeight/2)); simulation.alpha(0.2).restart(); }
});

// Gentle auto-drift
setInterval(() => {
  if (!simulation||simulation.alpha()>0.04) return;
  driftT += 0.0003;
  const ox=Math.sin(driftT)*18, oy=Math.cos(driftT*0.7)*13;
  simulation
    .force('clusterX',d3.forceX(d=>(CLUSTER_POS[d.cat]||CLUSTER_POS.kern).x*innerWidth+ox).strength(d=>d.id==='tens-core'?0.15:0.035))
    .force('clusterY',d3.forceY(d=>(CLUSTER_POS[d.cat]||CLUSTER_POS.kern).y*innerHeight+oy).strength(d=>d.id==='tens-core'?0.15:0.035));
  simulation.alpha(0.015).restart();
}, 5000);

// ── Main ──────────────────────────────────────────────────────────────────────
async function main() {
  setupSVG();

  // Add canvas for pulse animations
  const canvas = document.createElement('canvas');
  canvas.id = 'pulse-canvas';
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;';
  canvas.width = innerWidth; canvas.height = innerHeight;
  document.body.appendChild(canvas);

  document.getElementById('load-status').textContent = 'Lade Wissensnetzwerk...';
  const data = await loadData();
  await initGraph(data);

  const loader = document.getElementById('loading');
  loader.classList.add('hidden');
  setTimeout(() => loader.remove(), 600);

  animatePulses();
  setInterval(refreshData, REFRESH_MS);
}

main();
</script>
